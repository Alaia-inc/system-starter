version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      time: "09:00"
    groups:
      backend-non-breaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
      time: "09:00"
    groups:
      frontend-non-breaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
